[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [
    "libs/ingest_common/src",
    "libs/contracts/src",
    "libs/store/src",
    "apps/triage",
    "apps/opml",
    "apps/ingest",
    "apps/ingest-imap",
    "apps/ingest-youtube",
    "apps/ingest-gmail",
    "apps/ingest-obsidian",
    "apps/scheduler",
]
markers = [
    "db_live: requires INFOTRIAGE_TEST_DSN pointing at a reachable isolated test Postgres",
    "rabbitmq: requires RabbitMQ :22001 to be running",
]
