[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [
    "libs/ingest_common/src",
    "libs/contracts/src",
    "libs/store/src",
    "apps/triage",
    "apps/opml",
    "apps/ingest",
    "apps/ingest-imap",
    "apps/ingest-youtube",
    "apps/ingest-gmail",
    "apps/ingest-obsidian",
    "apps/scheduler",
]
markers = [
    "db_live: requires INFOTRIAGE_TEST_DSN pointing at a reachable isolated test Postgres",
    "rabbitmq: requires RabbitMQ :22001 to be running",
]
asyncio_default_fixture_loop_scope = "function"

[tool.mypy]
# Default targets: the shared libs (by their package directories) and tests.
files = [
    "libs/contracts/src/contracts",
    "libs/store/src/store",
    "libs/ingest_common/src/ingest_common",
    "tests",
]
# apps/* are excluded from the default run because several services contain a
# top-level main.py; mypy sees them as duplicate modules when scanned together.
# Check each app separately with:
#   for app in apps/*; do mypy "$app"; done
exclude = ["^apps/", "^scripts/", "^test_.*\\.py$"]
# Tests import from standalone app modules that are not installed packages.
ignore_missing_imports = true
