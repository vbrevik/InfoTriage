name: Black

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install black
        run: |
          python -m pip install --upgrade pip
          pip install black==24.10.0

      - name: Check formatting with black
        run: black --check apps/ libs/ tests/
