# infotriage — local, free info-triage hub. All on the Mac, no cloud.
# FreshRSS = aggregator/store · rss-bridge = sites→RSS · feeds = static Atom feed server.
services:
  freshrss:
    image: freshrss/freshrss:latest
    container_name: infotriage-freshrss
    restart: unless-stopped
    ports:
      - "8088:80"            # http://localhost:8088  (web UI + setup)
    environment:
      TZ: Europe/Oslo
      # Gentle global cadence so we never hammer a source. FreshRSS fetches feeds
      # one at a time; at 30-min cycles even GDELT (limit 1 req / 5 s) is safe.
      # Give rate-limited/heavy feeds (GDELT) a long per-feed TTL in the UI too.
      CRON_MIN: "23,53"      # twice an hour (not on the :00 stampede)
    volumes:
      - ./data/freshrss:/var/www/FreshRSS/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ | grep -q '<title>' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [infotriage]

  rssbridge:
    image: rssbridge/rss-bridge:latest
    container_name: infotriage-rssbridge
    restart: unless-stopped
    ports:
      - "3000:80"            # http://localhost:3000  (turn any site into RSS)
    volumes:
      - ./data/rssbridge:/config
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks: [infotriage]

  # Static server so FreshRSS can subscribe to the locally-generated email feed
  # at http://feeds/  (on the compose network). Host writes into ./data/feeds.
  feeds:
    image: halverneus/static-file-server:latest
    container_name: infotriage-feeds
    restart: unless-stopped
    environment:
      FOLDER: /web
      PORT: "80"
    volumes:
      - ./data/feeds:/web:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [infotriage]

  # Postgres 16 + pgvector for Phase 2+ storage.
  # Dev-only password here — production loads DSN from .env via INFOTRIAGE_PG_DSN (D-03, NF-6).
  # .env is gitignored and never committed.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: infotriage-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:22000:5432"   # localhost-only; host :22000 → container 5432
    environment:
      POSTGRES_DB: infotriage
      POSTGRES_USER: infotriage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infotriage_dev}   # dev default; override via env/.env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infotriage"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [infotriage]

  # RabbitMQ 3.13 for Phase 3 bus messaging.
  # Dev-only credentials — production loads from .env via INFOTRIAGE_RABBITMQ_* (NF-6).
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: infotriage-rabbitmq
    restart: unless-stopped
    ports:
      - "127.0.0.1:22001:5672"   # AMQP: localhost:22001 → container:5672
      - "127.0.0.1:22002:15672"  # Management UI: localhost:22002 → container:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-infotriage}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-infotriage_rmq}
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [infotriage]

  # ── Phase 4: Ingest adapters + Gmail MCP ──────────────────────────────────
  # Build context is the project root (.) so Dockerfiles can COPY libs/* (D-10/D-11).
  # All credentials arrive at runtime via env_file: [.env] — never in image layers (NF-6).
  # Adapter trigger ports published localhost-only in the 22010–22014 band (D-03).

  ingest-imap:
    build:
      context: .
      dockerfile: apps/ingest-imap/Dockerfile
    container_name: infotriage-ingest-imap
    restart: unless-stopped
    ports:
      - "127.0.0.1:22010:8000"   # trigger endpoint: localhost:22010 → container:8000
    env_file:
      - path: .env
        required: false   # .env is gitignored; present on host, not in repo
    environment:
      INFOTRIAGE_PG_DSN: ${INFOTRIAGE_PG_DSN:-postgresql://infotriage:infotriage_dev@postgres:5432/infotriage}
      INFOTRIAGE_AMQP_DSN: ${INFOTRIAGE_AMQP_DSN:-amqp://infotriage:infotriage_rmq@rabbitmq:5672}
      INFOTRIAGE_BLOB_ROOT: /data/blobs
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [infotriage]

  # ── Phase 5: Triage worker ─────────────────────────────────────────────
  # Consumes item.ingested, dedups via mE5-large embeddings, scores against
  # ccir.md with the local LLM (qwen36/qwen80b, ADR-004), persists
  # enrichment, publishes verdict.ready. Health port 22030 maps 1:1.
  triage:
    build:
      context: .
      dockerfile: apps/triage/Dockerfile
    container_name: infotriage-triage
    restart: unless-stopped
    ports:
      - "127.0.0.1:22030:22030"   # health: localhost:22030 → container:22030
    env_file:
      - path: .env
        required: false   # .env is gitignored; present on host, not in repo
    environment:
      INFOTRIAGE_PG_DSN: ${INFOTRIAGE_PG_DSN:-postgresql://infotriage:infotriage_dev@postgres:5432/infotriage}
      INFOTRIAGE_AMQP_DSN: ${INFOTRIAGE_AMQP_DSN:-amqp://infotriage:infotriage_rmq@rabbitmq:5672}
      INFOTRIAGE_BLOB_ROOT: /data/blobs
      # NOT ${LLM_BASE_URL:-...}: .env's LLM_BASE_URL=127.0.0.1 is for host-side scripts
      # (e.g. triage_score.py run on the Mac); 127.0.0.1 inside this container is the
      # container itself, not the host, so that value must never leak in here.
      LLM_BASE_URL: http://host.docker.internal:8000/v1   # host oMLX — ADR-004, local only
      LLM_API_KEY: ${LLM_API_KEY:-omlx}
      LLM_MODEL: ${LLM_MODEL:-qwen36-ud-4bit}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # resolves the host oMLX endpoint on non-Docker-Desktop engines
    volumes:
      - ./data:/data
      # CCIR hot-read (D-5): triage_score.py's CCIR_PATH resolves to /ccir.md inside the
      # container; without this mount the scorer silently falls back to a stub prompt.
      - ./ccir.md:/ccir.md:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:22030/health', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [infotriage]

  # Phase 6: brief app — consumes verdict.ready from q.brief, renders + serves the SAB,
  # publishes sab.published. Port 22040 per D-14 (127.0.0.1-only, 22000+ band).
  brief:
    build:
      context: .
      dockerfile: apps/brief/Dockerfile
    container_name: infotriage-brief
    restart: unless-stopped
    ports:
      - "127.0.0.1:22040:22040"   # SAB: localhost:22040 → container:22040 (D-14)
    env_file:
      - path: .env
        required: false   # .env is gitignored; present on host, not in repo
    environment:
      INFOTRIAGE_PG_DSN: ${INFOTRIAGE_PG_DSN:-postgresql://infotriage:infotriage_dev@postgres:5432/infotriage}
      INFOTRIAGE_AMQP_DSN: ${INFOTRIAGE_AMQP_DSN:-amqp://infotriage:infotriage_rmq@rabbitmq:5672}
      INFOTRIAGE_BLOB_ROOT: /data/blobs
      INFOTRIAGE_DIGESTS_DIR: /data/digests
      INFOTRIAGE_VAULT_PATH: /vault/brief-outbox
      CLUSTER_THRESHOLD: ${CLUSTER_THRESHOLD:-0.75}
      VAULT_INCLUDE_EMAIL: ${VAULT_INCLUDE_EMAIL:-1}
      # NOT ${LLM_BASE_URL:-...}: .env's LLM_BASE_URL=127.0.0.1 is for host-side scripts;
      # inside the container that resolves to the container itself (see triage note).
      LLM_BASE_URL: http://host.docker.internal:8000/v1   # host oMLX — ADR-004, local only
      LLM_API_KEY: ${LLM_API_KEY:-omlx}
      LLM_MODEL: ${LLM_MODEL:-qwen36-ud-4bit}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # resolves the host oMLX endpoint on non-Docker-Desktop engines
    volumes:
      - ./data:/data
      - ${OBSIDIAN_VAULT_PATH:-./data/obsidian}/brief-outbox:/vault/brief-outbox:rw
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:22040/health', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [infotriage]

  ingest-youtube:
    build:
      context: .
      dockerfile: apps/ingest-youtube/Dockerfile
    container_name: infotriage-ingest-youtube
    restart: unless-stopped
    ports:
      - "127.0.0.1:22011:8000"   # trigger endpoint: localhost:22011 → container:8000
    env_file:
      - path: .env
        required: false   # .env is gitignored; present on host, not in repo
    environment:
      INFOTRIAGE_PG_DSN: ${INFOTRIAGE_PG_DSN:-postgresql://infotriage:infotriage_dev@postgres:5432/infotriage}
      INFOTRIAGE_AMQP_DSN: ${INFOTRIAGE_AMQP_DSN:-amqp://infotriage:infotriage_rmq@rabbitmq:5672}
      INFOTRIAGE_BLOB_ROOT: /data/blobs
    volumes:
      - ./data:/data
      - ./data/feeds:/app/data/feeds   # writable: ingest-youtube writes Atom XML for FreshRSS
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [infotriage]

  # Gmail MCP server — Node.js container serving @shinzolabs/gmail-mcp via HTTP.
  # SECURITY: port MUST be 127.0.0.1:22025:3000 (localhost-only — never 0.0.0.0:22025).
  # (ADR-008, T-04-15: elevation-of-privilege if exposed to 0.0.0.0)
  gmail-mcp-server:
    build:
      context: .
      dockerfile: gmail-mcp-server/Dockerfile
    container_name: infotriage-gmail-mcp-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:22025:3000"   # LOCALHOST-ONLY — never 0.0.0.0/bare 22025 (ADR-008)
    env_file:
      - path: .env
        required: false   # .env is gitignored; present on host, not in repo
    environment:
      PORT: "3000"
      CLIENT_ID: ${GMAIL_OAUTH2_CLIENT_ID}
      CLIENT_SECRET: ${GMAIL_OAUTH2_CLIENT_SECRET}
      REFRESH_TOKEN: ${GMAIL_OAUTH2_REFRESH_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [infotriage]

  ingest-gmail:
    build:
      context: .
      dockerfile: apps/ingest-gmail/Dockerfile
    container_name: infotriage-ingest-gmail
    restart: unless-stopped
    ports:
      - "127.0.0.1:22012:8000"   # trigger endpoint: localhost:22012 → container:8000
    env_file:
      - path: .env
        required: false   # .env is gitignored; present on host, not in repo
    environment:
      INFOTRIAGE_PG_DSN: ${INFOTRIAGE_PG_DSN:-postgresql://infotriage:infotriage_dev@postgres:5432/infotriage}
      INFOTRIAGE_AMQP_DSN: ${INFOTRIAGE_AMQP_DSN:-amqp://infotriage:infotriage_rmq@rabbitmq:5672}
      INFOTRIAGE_BLOB_ROOT: /data/blobs
      GMAIL_MCP_URL: http://gmail-mcp-server:3000
      GMAIL_QUERY: ${GMAIL_QUERY:-newer_than:7d}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      gmail-mcp-server:
        condition: service_started
    networks: [infotriage]

  ingest-obsidian:
    build:
      context: .
      dockerfile: apps/ingest-obsidian/Dockerfile
    container_name: infotriage-ingest-obsidian
    restart: unless-stopped
    ports:
      - "127.0.0.1:22013:8000"   # trigger endpoint: localhost:22013 → container:8000
    env_file:
      - path: .env
        required: false   # .env is gitignored; present on host, not in repo
    environment:
      INFOTRIAGE_PG_DSN: ${INFOTRIAGE_PG_DSN:-postgresql://infotriage:infotriage_dev@postgres:5432/infotriage}
      INFOTRIAGE_AMQP_DSN: ${INFOTRIAGE_AMQP_DSN:-amqp://infotriage:infotriage_rmq@rabbitmq:5672}
      INFOTRIAGE_BLOB_ROOT: /data/blobs
      OBSIDIAN_VAULT_PATH: /vault
    volumes:
      - ./data:/data
      - ${OBSIDIAN_VAULT_PATH}/articles-inbox:/vault/articles-inbox:ro   # READ-ONLY vault (T-04-17)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [infotriage]

  # Scheduler — APScheduler 3.x fires all four adapters on per-adapter cron schedules.
  # On 409 (adapter already running) the trigger is logged as 'skipped' (D-04, SPEC R5).
  scheduler:
    build:
      context: .
      dockerfile: apps/scheduler/Dockerfile
    container_name: infotriage-scheduler
    restart: unless-stopped
    ports:
      - "127.0.0.1:22014:8000"   # health/status endpoint (D-03)
    env_file:
      - path: .env
        required: false   # .env is gitignored; present on host, not in repo
    environment:
      SCHEDULE_IMAP: ${SCHEDULE_IMAP:-0 */2 * * *}
      SCHEDULE_YOUTUBE: ${SCHEDULE_YOUTUBE:-0 */4 * * *}
      SCHEDULE_GMAIL: ${SCHEDULE_GMAIL:-0 */2 * * *}
      SCHEDULE_OBSIDIAN: ${SCHEDULE_OBSIDIAN:-*/30 * * * *}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      - ingest-imap
      - ingest-youtube
      - ingest-gmail
      - ingest-obsidian
    networks: [infotriage]

networks:
  infotriage:
    name: infotriage
