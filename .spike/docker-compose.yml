version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "22060:5672"
      - "22061:15672"
    environment:
      RABBITMQ_DEFAULT_USER: spike
      RABBITMQ_DEFAULT_PASS: spike
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      - "22062:5432"
    environment:
      POSTGRES_USER: spike
      POSTGRES_PASSWORD: spike
      POSTGRES_DB: spike
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spike"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
